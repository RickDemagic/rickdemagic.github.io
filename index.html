<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RD Systems – Digitale Präzision</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:#0f172a;
color:#e2e8f0;
line-height:1.7;
scroll-behavior:smooth;
}

/* NAVIGATION */
.navbar{
position:fixed;
width:100%;
padding:20px 8%;
background:rgba(15,23,42,0.75);
backdrop-filter:blur(20px);
z-index:1000;
}

.nav-container{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1400px;
margin:auto;
}

/* LOGO GLOW */
.logo{
position:relative;
display:inline-block;
}

.logo img{
height:65px;
transition:0.4s ease;
filter:drop-shadow(0 0 8px rgba(255,0,0,0.25));
}

/* Subtiler Puls */
.logo::after{
content:"";
position:absolute;
inset:-10px;
border-radius:20px;
background:radial-gradient(circle, rgba(255,0,0,0.35) 0%, rgba(255,0,0,0) 70%);
opacity:0.4;
z-index:-1;
animation:pulse 3.5s infinite ease-in-out;
}

.logo:hover img{
transform:scale(1.05);
filter:drop-shadow(0 0 15px rgba(255,0,0,0.6));
}

@keyframes pulse{
0%{opacity:0.3; transform:scale(0.95);}
50%{opacity:0.6; transform:scale(1.05);}
100%{opacity:0.3; transform:scale(0.95);}
}

.navbar nav a{
color:#e2e8f0;
text-decoration:none;
margin-left:30px;
transition:.3s;
}

.navbar nav a:hover{
color:#22c55e;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:url('https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=2000&q=80') center/cover no-repeat;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9));
}

.hero-content{
position:relative;
z-index:2;
max-width:900px;
}

.hero h1{
font-size:60px;
font-weight:800;
margin-bottom:20px;
}

.hero p{
font-size:22px;
opacity:.9;
}

.hero-buttons{
margin-top:40px;
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.btn-primary{
padding:18px 40px;
background:#22c55e;
color:#0f172a;
font-weight:600;
border-radius:50px;
text-decoration:none;
transition:.3s;
}

.btn-primary:hover{background:#16a34a;}

.btn-secondary{
padding:18px 40px;
border:1px solid #334155;
border-radius:50px;
color:#e2e8f0;
text-decoration:none;
transition:.3s;
}

.btn-secondary:hover{
background:#1e293b;
}

/* FOOTER */
footer{
padding:60px;
text-align:center;
background:#0f172a;
}

@media(max-width:900px){
.hero h1{font-size:42px;}
.logo img{height:50px;}
}
</style>
</head>

<body>

<header class="navbar">
<div class="nav-container">

<a href="#" class="logo">
<img src="logo.png" alt="RD Systems Logo">
</a>

<nav>
<a href="#contact">Kontakt</a>
</nav>

</div>
</header>

<section class="hero">
<div class="hero-content">
<h1>Digitale Struktur mit Wirkung</h1>
<p>Websites, die verkaufen – nicht nur gut aussehen.</p>

<div class="hero-buttons">
<a href="#contact" class="btn-primary">Projekt starten</a>
<a href="#contact" class="btn-secondary">Kostenlose Analyse</a>
</div>
</div>
</section>

<footer>
© 2026 RD Systems
</footer>

</body>
</html>
