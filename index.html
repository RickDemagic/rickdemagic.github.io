<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyse anfordern</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.box {
    background: white;
    padding: 40px;
    border-radius: 8px;
    width: 100%;
    max-width: 400px;
    text-align: center;
}
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
}
button {
    width: 100%;
    padding: 14px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="box">
<h2>Kostenlose Analyse sichern</h2>

<form action="https://formsubmit.co/rickdemagic@web.de" method="POST">
<input type="hidden" name="_captcha" value="false">
<input type="text" name="Name" placeholder="Ihr Name" required>
<input type="email" name="Email" placeholder="Ihre E-Mail-Adresse" required>
<button type="submit">Jetzt anfordern</button>
</form>

</div>

</body>
</html>
