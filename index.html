<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RD Systems – Digitale Präzision</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:#0f172a;
color:#e2e8f0;
line-height:1.7;
scroll-behavior:smooth;
}

/* NAV */
.navbar{
position:fixed;
width:100%;
padding:25px 8%;
background:rgba(15,23,42,0.7);
backdrop-filter:blur(20px);
z-index:1000;
}

.nav-container{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1400px;
margin:auto;
}

.logo{font-weight:800;font-size:20px;}

.navbar a{
color:#e2e8f0;
text-decoration:none;
margin-left:30px;
transition:.3s;
}

.navbar a:hover{color:#22c55e;}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:url('https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=2000&q=80') center/cover no-repeat;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.85));
}

.hero-content{
position:relative;
z-index:2;
max-width:900px;
animation:fadeUp 1.2s ease;
}

.hero h1{
font-size:64px;
font-weight:800;
margin-bottom:20px;
}

.hero p{
font-size:22px;
opacity:.9;
}

.hero-buttons{
margin-top:40px;
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.btn-primary{
padding:18px 40px;
background:#22c55e;
color:#0f172a;
font-weight:600;
border-radius:50px;
text-decoration:none;
transition:.3s;
}

.btn-primary:hover{background:#16a34a;}

.btn-secondary{
padding:18px 40px;
border:1px solid #334155;
border-radius:50px;
color:#e2e8f0;
text-decoration:none;
transition:.3s;
}

.btn-secondary:hover{
background:#1e293b;
}

/* SECTION */
.section{padding:140px 8%;}
.container{max-width:1200px;margin:auto;}

.section h2{
font-size:42px;
margin-bottom:40px;
text-align:center;
}

/* CONTACT */
.contact{
background:#0b1220;
text-align:center;
}

.form-group{
position:relative;
margin-bottom:30px;
}

.contact input,
.contact textarea{
width:100%;
padding:20px;
background:#1e293b;
border:none;
border-radius:12px;
color:white;
font-size:16px;
}

.contact label{
position:absolute;
left:20px;
top:20px;
color:#94a3b8;
transition:.3s;
pointer-events:none;
}

.contact input:focus + label,
.contact input:not(:placeholder-shown) + label,
.contact textarea:focus + label,
.contact textarea:not(:placeholder-shown) + label{
top:-10px;
left:15px;
font-size:12px;
background:#0b1220;
padding:0 5px;
color:#22c55e;
}

.contact button{
width:100%;
padding:20px;
background:#22c55e;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.contact button:hover{background:#16a34a;}

.success-message{
display:none;
margin-top:30px;
padding:20px;
background:#16a34a;
border-radius:12px;
font-weight:600;
}

/* FOOTER */
footer{
padding:60px;
text-align:center;
background:#0f172a;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

@media(max-width:900px){
.hero h1{font-size:42px;}
}
</style>
</head>

<body>

<header class="navbar">
<div class="nav-container">
<div class="logo">RD Systems</div>
<nav>
<a href="#contact">Kontakt</a>
</nav>
</div>
</header>

<section class="hero">
<div class="hero-content">
<h1>Digitale Struktur mit Wirkung</h1>
<p>Websites, die verkaufen – nicht nur gut aussehen.</p>

<div class="hero-buttons">
<a href="#contact" class="btn-primary">Projekt starten</a>
<a href="#contact" class="btn-secondary">Kostenlose Analyse</a>
</div>
</div>
</section>

<section id="contact" class="section contact">
<div class="container">
<h2>Kontakt</h2>

<form id="contactForm">
<div class="form-group">
<input type="text" name="name" placeholder=" " required>
<label>Name</label>
</div>

<div class="form-group">
<input type="email" name="email" placeholder=" " required>
<label>E-Mail</label>
</div>

<div class="form-group">
<textarea name="message" rows="5" placeholder=" " required></textarea>
<label>Nachricht</label>
</div>

<button type="submit">Anfrage senden</button>
</form>

<div class="success-message" id="successMessage">
Danke. Ihre Anfrage wurde erfolgreich übermittelt.
</div>

</div>
</section>

<footer>
© 2026 RD Systems
</footer>

<script>
const form = document.getElementById("contactForm");
const successMessage = document.getElementById("successMessage");

form.addEventListener("submit", async function(e){
e.preventDefault();

const data = new FormData(form);

const response = await fetch("https://formspree.io/f/xzdanbzj", {
method: "POST",
body: data,
headers: { 'Accept': 'application/json' }
});

if(response.ok){
form.reset();
successMessage.style.display = "block";
}
});
</script>

</body>
</html>
